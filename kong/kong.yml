_format_version: "3.0"
_transform: true

services:
  - name: auth-service
    url: http://auth-service:8081
    routes:
      - name: auth-routes
        paths:
          - /auth
        strip_path: false

  - name: menu-service
    url: http://menu-service:8082
    routes:
      - name: menu-routes
        paths:
          - /categories
          - /menu-items
          - /content-creators
        strip_path: false

  - name: order-service
    url: http://order-service:8083
    routes:
      - name: order-routes
        paths:
          - /orders
          - /order-items
        strip_path: false

  - name: reservation-service
    url: http://reservation-service:8084
    routes:
      - name: reservation-routes
        paths:
          - /reservations
          - /tables
        strip_path: false

  - name: frontend-service
    url: http://frontend:80
    routes:
      - name: frontend-routes
        paths:
          - /
        strip_path: false

plugins:
  - name: cors
    config:
      origins:
        - "http://localhost:3002"
        - "http://localhost:3000"
        - "http://localhost:8000"
        - "http://localhost:5173"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
      exposed_headers:
        - Authorization
      credentials: true
      max_age: 3600